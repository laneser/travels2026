<!DOCTYPE html>
<html lang="{{REPO_LANG}}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c8102e" />
  <meta name="description" content="{{REPO_DESCRIPTION}}" />
  <title>{{REPO_TITLE}}</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🗺️%3C/text%3E%3C/svg%3E" />
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <span class="brand-emoji">🗺️</span>
      <div class="brand-text">
        <div class="brand-title">{{REPO_TITLE}}</div>
        <div class="brand-sub">{{REPO_DESCRIPTION}}</div>
      </div>
    </div>
  </div>
</header>

<main id="app">
  <section class="view active">
    <h2 class="trips-heading">所有旅行</h2>
    <div class="trip-grid" id="trip-grid">
      <!-- TRIPS -->
    </div>
  </section>
</main>

<footer class="foot">
  <p class="muted small">© <span id="year"></span> · 點任一趟旅行進入該站</p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
